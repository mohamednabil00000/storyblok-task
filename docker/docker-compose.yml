version: '3.8'
services:
  web:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    command: bundle exec rails s -p 3001 -b '0.0.0.0'
    volumes:
      - "../.:/app"
    ports:
      - "3001:3001"
    depends_on:
      - db
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgresql://postgres:password@db:5432/backend_test_development
      REDIS_URL: redis://redis:6379/0

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: backend_test_development

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  sidekiq:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    # Overwrites the default command to run sidekiq
    command: bundle exec sidekiq
    volumes:
      - "../.:/myapp"
    depends_on:
      - redis
      - web # Optional, but ensures web service is up if needed
    environment:
      REDIS_URL: redis://redis:6379/0

volumes:
  postgres_data:
  redis-data:
    driver: local
